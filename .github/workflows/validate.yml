name: Validate Codex Game Studio

on:
  push:
  pull_request:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate repository on Linux and macOS
        if: runner.os != 'Windows'
        run: sh scripts/validate_repository.sh

      - name: Validate repository on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/validate_repository.ps1
